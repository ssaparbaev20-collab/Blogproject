{% extends 'base.html' %}

{% block content %}
    <div class="detail-container">
        <h2>{{ post.author }}</h2>
        <h3>{{ post.title }}</h3>
        <p>{{ post.body }}</p>
    </div>
    <p><a href="{% url 'post_edit' post.pk %}">Postni tahrirlash</a></p>
    <p><a href="{% url 'post_delete' post.pk %}">Postni o'chirish</a></p>
{% endblock content %}
